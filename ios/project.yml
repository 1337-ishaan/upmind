name: Upmind
options:
  bundleIdPrefix: com.upmind
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Upmind/Library/Config/Info.plist
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""            # fill in later in Xcode
    CODE_SIGN_STYLE: Automatic
packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.6.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.30.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.20.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.18.0"
targets:
  Upmind:
    type: application
    platform: iOS
    sources:
      - path: Upmind
    configFiles:
      # Secrets.xcconfig is gitignored. Copy from Secrets.example.xcconfig
      # and fill in your dev keys. If the file is missing, xcodegen warns
      # but the project still builds — the app will run in anonymous mode.
      Debug: Upmind/Library/Config/Secrets.xcconfig
      Release: Upmind/Library/Config/Secrets.xcconfig
    info:
      path: Upmind/Library/Config/Info.plist
      properties:
        CFBundleDisplayName: Upmind
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSUserNotificationsUsageDescription: "Upmind uses notifications to remind you about your daily drill, warn before your streak ends, and recap your weekly progress."
        # Public project URLs (not secrets) are inlined here. The xcodebuild
        # Info.plist substitution truncates URL values at the first colon when
        # sourced from xcconfig, so we hardcode them in the plist directly.
        # The xcconfig path only works for values without colons (i.e. API keys).
        SupabaseURL: "https://vchsujpxhtudwdripwnk.supabase.co"
        PostHogHost: "https://us.i.posthog.com"
        # Secret API keys are read from $(VAR_NAME) placeholders that
        # xcodebuild resolves from a gitignored Secrets.xcconfig. See
        # Secrets.example.xcconfig for the format. The Supabase service-role
        # key (sb_secret_*) must NEVER appear here — it bypasses RLS and is
        # for server-side use only.
        PostHogAPIKey: "$(POSTHOG_API_KEY)"
        SupabaseAnonKey: "$(SUPABASE_ANON_KEY)"
        RevenueCatAPIKey: "$(REVENUECAT_API_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.upmind.app
    dependencies:
      - package: PostHog
        product: PostHog
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
  UpmindTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Upmind
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Upmind.app/Upmind
schemes:
  Upmind:
    build:
      targets:
        Upmind: all
        UpmindTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - UpmindTests
    archive:
      config: Release
