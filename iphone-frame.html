<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Upmind · iPhone 17 Pro Max</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:40px 20px}

/* ── Dynamic Island ── */
.dynamic-island{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:20px;z-index:10;display:flex;align-items:center;justify-content:center;gap:8px}
.dynamic-island .camera{width:10px;height:10px;border-radius:50%;background:rgba(30,30,50,0.8);border:1px solid rgba(255,255,255,0.08)}

/* ── iPhone Frame ── */
.iphone-wrapper{position:relative;display:flex;flex-direction:column;align-items:center}
.iphone{position:relative;width:430px;height:932px;background:#060A14;border-radius:55px;padding:18px;box-shadow:
  0 0 0 3px #3a3a4a,
  0 0 0 6px #1a1a2e,
  0 0 0 9px #2a2a3a,
  0 8px 60px rgba(0,0,0,0.6),
  0 2px 20px rgba(0,0,0,0.4),
  inset 0 0 3px rgba(255,255,255,0.05);
overflow:hidden}
.iphone-screen{width:100%;height:100%;border-radius:40px;overflow:hidden;background:#060A14;position:relative}
.iphone-screen iframe{width:100%;height:100%;border:none;display:block}

/* ── Side buttons ── */
.side-buttons{position:absolute;right:-3px;top:180px;display:flex;flex-direction:column;gap:12px}
.side-buttons div{width:3px;height:55px;background:#3a3a4a;border-radius:0 2px 2px 0;box-shadow:0 0 0 1px #2a2a3a}
.side-buttons .mute{height:30px;position:absolute;left:-6px;top:-60px;width:3px;background:#3a3a4a;border-radius:2px 0 0 2px;box-shadow:0 0 0 1px #2a2a3a}

/* ── Label ── */
.label{color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:30px;font-weight:500}
.sub-label{color:rgba(255,255,255,0.15);font-size:10px;letter-spacing:1px;margin-top:4px}

/* ── Responsive ── */
@media (max-width:520px){
  .iphone{width:340px;height:736px;border-radius:44px;padding:14px}
  .iphone-screen{border-radius:32px}
  .dynamic-island{width:100px;height:28px;top:8px}
}
</style>
</head>
<body>
  <div class="iphone-wrapper">
    <div class="iphone" id="iphone">
      <div class="side-buttons">
        <div class="mute"></div>
        <div></div><div></div><div style="position:absolute;top:75px"></div>
      </div>
      <div class="iphone-screen">
        <div class="dynamic-island"><div class="camera"></div></div>
        <iframe id="appFrame" title="Upmind" loading="eager"></iframe>
      </div>
    </div>
    <div class="label">Upmind · iPhone 17 Pro Max</div>
    <div class="sub-label">Tap to interact · Pinch to zoom</div>
  </div>

<script>
// Retry connection to local server
function loadApp() {
  const iframe = document.getElementById('appFrame');
  iframe.src = 'http://localhost:3000/index.html';
}
// Try immediately, fallback to file:// if server not ready
loadApp();
// If iframe fails to load, try file://
iframe = document.getElementById('appFrame');
iframe.onerror = function() {
  iframe.src = 'file:///Users/ishaanparmar/Desktop/projects/upmind/index.html';
};
</script>
</body>
</html>
