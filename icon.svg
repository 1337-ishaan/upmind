<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#060A14"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#14B8A6" stroke-width="8" opacity="0.15"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="#14B8A6" stroke-width="3" opacity="0.3"/>
  <!-- Neural node cluster -->
  <circle cx="256" cy="220" r="16" fill="#14B8A6" opacity="0.9"/>
  <circle cx="210" cy="280" r="10" fill="#14B8A6" opacity="0.5"/>
  <circle cx="302" cy="280" r="10" fill="#14B8A6" opacity="0.5"/>
  <circle cx="238" cy="310" r="8" fill="#14B8A6" opacity="0.35"/>
  <circle cx="274" cy="310" r="8" fill="#14B8A6" opacity="0.35"/>
  <!-- Neural connections -->
  <line x1="256" y1="220" x2="210" y2="280" stroke="#14B8A6" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="220" x2="302" y2="280" stroke="#14B8A6" stroke-width="2" opacity="0.4"/>
  <line x1="210" y1="280" x2="238" y2="310" stroke="#14B8A6" stroke-width="1.5" opacity="0.25"/>
  <line x1="302" y1="280" x2="274" y2="310" stroke="#14B8A6" stroke-width="1.5" opacity="0.25"/>
  <line x1="210" y1="280" x2="302" y2="280" stroke="#14B8A6" stroke-width="1.5" opacity="0.15"/>
  <!-- Central pulse ring -->
  <circle cx="256" cy="220" r="24" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.2">
    <animate attributeName="r" values="24;36;24" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
